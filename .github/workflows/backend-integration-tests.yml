name: Backend Integration Tests

on:
  workflow_call:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-integration-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-integration-tests.yml'

defaults:
  run:
    working-directory: backend

jobs:
  integration-tests:
    name: Backend integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Start test Postgres
        run: |
          docker compose -f docker-compose.test.yml up -d
          timeout 30 bash -c 'until docker compose -f docker-compose.test.yml exec -T postgres pg_isready -U postgres; do sleep 1; done'

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/vet_shifter_test
          JWT_SECRET: test-secret-at-least-32-characters-long
        run: go test -v -count=1 -tags=integration ./internal/... ./test/integration/...

      - name: Stop test Postgres
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
