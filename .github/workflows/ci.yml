name: CI

on:
  push:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/frontend-typecheck.yml'
      - '.github/workflows/backend-unit-tests.yml'
      - '.github/workflows/backend-integration-tests.yml'
      - '.github/workflows/backend-arch-go.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/frontend-typecheck.yml'
      - '.github/workflows/backend-unit-tests.yml'
      - '.github/workflows/backend-integration-tests.yml'
      - '.github/workflows/backend-arch-go.yml'
  workflow_dispatch:

jobs:
  typecheck:
    name: Frontend TypeScript
    uses: ./.github/workflows/frontend-typecheck.yml

  unit-tests:
    name: Backend unit tests
    uses: ./.github/workflows/backend-unit-tests.yml

  integration-tests:
    name: Backend integration tests
    uses: ./.github/workflows/backend-integration-tests.yml

  arch-go:
    name: Backend architecture
    uses: ./.github/workflows/backend-arch-go.yml
